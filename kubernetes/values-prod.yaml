postgresql:
  image:
    repository: ghcr.io/cloudnativepg/postgresql
    tag: 16
  instances: 3
  storage:
    size: 100Gi
    storageClass: premium-rwo
  resources:
    requests:
      memory: 4Gi
      cpu: 2
    limits:
      memory: 8Gi
      cpu: 4
  backup:
    enabled: true
    barmanObjectStore:
      destinationPath: s3://pg-backups-prod/
      wal:
        compression: gzip
  monitoring:
    enablePodMonitor: true
  podDisruptionBudget:
    enabled: true
