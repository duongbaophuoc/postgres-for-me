version: '3.9'

services:
  coordinator:
    image: citusdata/citus:11.0
    container_name: citus_coordinator
    environment:
      POSTGRES_USER: citus
      POSTGRES_PASSWORD: citus
      POSTGRES_DB: citus
      POSTGRES_INITDB_ARGS: "-c shared_buffers=512MB -c effective_cache_size=2GB -c work_mem=20MB -c max_connections=400"
    ports:
      - "5432:5432"
    volumes:
      - coordinator_data:/var/lib/postgresql/data
    networks:
      - citus-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '1.5'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citus -d citus"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker1:
    image: citusdata/citus:11.0
    container_name: citus_worker1
    environment:
      POSTGRES_USER: citus
      POSTGRES_PASSWORD: citus
      POSTGRES_DB: citus
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c effective_cache_size=1GB -c work_mem=10MB -c max_connections=200"
    ports:
      - "5433:5432"
    volumes:
      - worker1_data:/var/lib/postgresql/data
    networks:
      - citus-net
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1.5G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citus -d citus"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker2:
    image: citusdata/citus:11.0
    container_name: citus_worker2
    environment:
      POSTGRES_USER: citus
      POSTGRES_PASSWORD: citus
      POSTGRES_DB: citus
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c effective_cache_size=1GB -c work_mem=10MB -c max_connections=200"
    ports:
      - "5434:5432"
    volumes:
      - worker2_data:/var/lib/postgresql/data
    networks:
      - citus-net
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1.5G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citus -d citus"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  coordinator_data:
  worker1_data:
  worker2_data:

networks:
  citus-net:
    driver: bridge
